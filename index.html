<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE MINING BLOG265</title>
  
  <!-- Core Script Engine CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase Compat CDNs (Safe for Babel standalone integration) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Tailwind CSS Engine with custom configuration -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['SF Pro Display', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(24px);
      transition: all 0.65s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .opacity-100 { opacity: 1 !important; }
    .translate-y-0 { transform: translateY(0px) !important; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* Custom high-fidelity scrolls */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(156, 163, 175, 0.25);
      border-radius: 10px;
    }

    /* iOS 26 Premium Frosted Glass highlights */
    .glass-ios {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    .dark .glass-ios {
      background: rgba(15, 23, 42, 0.45);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-500 overflow-x-hidden">

  <!-- React Mount Point -->
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const INITIAL_FEED = [
      {
        id: 1,
        author: "Admin (KAMWANJE)",
        avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150",
        story: "Exciting breakthrough at our central region site today! Discovered a premium vein of high-grade alluvial gold. Production efficiency is up by 25%. Our geological models are performing extremely well.",
        media: "https://images.unsplash.com/photo-1610375229632-c7158c35a537?w=800",
        mediaType: "image",
        timestamp: "2 hours ago",
        likes: 24,
        reactions: { like: 12, love: 8, fire: 4, diamond: 3 },
        userReaction: null,
        comments: [
          {
            id: 101,
            user: "Chikondi Phiri",
            avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100",
            text: "Outstanding discovery! This is huge for the local mining sector.",
            replies: [
              { id: 201, user: "Admin", text: "Thank you Chikondi! More updates coming soon." }
            ]
          }
        ]
      },
      {
        id: 2,
        author: "Admin (KAMWANJE)",
        avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150",
        story: "Quick breakdown of our new environmental safety consultancy metrics for 2026. Sustainable geology is our ultimate signature focus.",
        media: "https://www.w3schools.com/html/mov_bbb.mp4",
        mediaType: "video",
        timestamp: "1 day ago",
        likes: 15,
        reactions: { like: 5, love: 4, fire: 5, diamond: 1 },
        userReaction: null,
        comments: []
      }
    ];

    const INITIAL_MINERALS = [
      {
        id: 1,
        name: "Refined Gold Nuggets",
        weight: "250 grams",
        location: "Lilongwe River Basin",
        priceUSD: 16500,
        media: "https://images.unsplash.com/photo-1589156280159-27698a70f29e?w=600"
      },
      {
        id: 2,
        name: "Raw Aquamarine Crystal",
        weight: "1.2 kilograms",
        location: "Mzimba District",
        priceUSD: 4200,
        media: "https://images.unsplash.com/photo-1599707367072-cd6ada2bc375?w=600"
      }
    ];

    const INITIAL_HYDROLOGY_LOGS = [
      {
        id: 1,
        location: "Shire River Basal Aquifer",
        waterDepth: "42.5 meters",
        phLevel: 7.2,
        dischargeRate: "18.4 m³/day",
        loggedBy: "Geologist Inspector",
        media: null
      },
      {
        id: 2,
        location: "Zomba Plateau Fractured Zone",
        waterDepth: "115.0 meters",
        phLevel: 6.8,
        dischargeRate: "5.2 m³/day",
        loggedBy: "KAMWANJE Surveyor",
        media: null
      }
    ];

    function App() {
      const [currentTab, setCurrentTab] = useState('home');
      const [darkMode, setDarkMode] = useState(true);
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminKeyInput, setAdminKeyInput] = useState('');
      const [adminKeyError, setAdminKeyError] = useState('');
      const [currency, setCurrency] = useState('MWK'); // MWK or USD
      const [siteLogo, setSiteLogo] = useState(null); // Dynamic Local Storage Logo State
      const [siteTitle, setSiteTitle] = useState('THE MINING BLOG265'); // Configurable platform identity
      const [usdToMwkRate, setUsdToMwkRate] = useState(1750); // Admin configurable exchange rate

      // System audit logs state (Tracks all real-time platform user/admin operations)
      const [systemLogs, setSystemLogs] = useState([
        { id: 1, timestamp: "09:30:00 AM", category: "System", message: "MINING & CONSULTANCY265 frameworks successfully mounted." }
      ]);

      // Global safety toggles managed by admin
      const [allowComments, setAllowComments] = useState(true);
      const [allowRegistration, setAllowRegistration] = useState(true);
      const [maintenanceMode, setMaintenanceMode] = useState(false);

      // Admin Tab visibility controls
      const [allowedTabs, setAllowedTabs] = useState({
        home: true,
        minerals: true,
        hydrologics: true,
        chat: true,
        profile: true
      });

      // --- FEATURE STATES ---
      const [feed, setFeed] = useState(INITIAL_FEED);
      const [minerals, setMinerals] = useState(INITIAL_MINERALS);
      const [hydroLogs, setHydroLogs] = useState(INITIAL_HYDROLOGY_LOGS);
      const [chatMessages, setChatMessages] = useState([
        { id: 1, sender: 'admin', text: 'Welcome to THE MINING BLOG265 official hub. How can we assist you with exploration, hydraulics, or mineral trade parameters today?', timestamp: '09:30 AM', media: null }
      ]);
      
      // Authenticated User States
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [userEmail, setUserEmail] = useState('');
      const [authMode, setAuthMode] = useState('login'); // 'login' or 'signup'
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authDisplayName, setAuthDisplayName] = useState('');
      const [authError, setAuthError] = useState('');
      const [isAuthLoading, setIsAuthLoading] = useState(false);

      const [profile, setProfile] = useState({
        name: 'Guest Explorer',
        email: '',
        phone: '+265 888 12 34 56',
        bio: 'Passionate about geology and raw mineral commerce across Malawi.',
        link: 'https://github.com',
        avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150',
        gallery: []
      });

      // Dynamic input states
      const [newPostText, setNewPostText] = useState('');
      const [newPostMedia, setNewPostMedia] = useState('');
      const [newPostMediaType, setNewPostMediaType] = useState('image');
      
      const [newMineral, setNewMineral] = useState({ name: '', weight: '', location: '', priceUSD: '', media: '' });
      const [chatInput, setChatInput] = useState('');
      const [commentInputs, setCommentInputs] = useState({});
      const [replyInputs, setReplyInputs] = useState({});
      const [activeReplyBox, setActiveReplyBox] = useState(null);
      const [isRecording, setIsRecording] = useState(false);

      // Creative Flow Modals
      const [isCreateModalOpen, setIsCreateModalOpen] = useState(false);
      const [isBioModalOpen, setIsBioModalOpen] = useState(false);

      // Meta edit profile state buffer
      const [tempProfile, setTempProfile] = useState({ ...profile });

      // --- EDITING STATES FOR FEED AND INVENTORY ---
      const [editingPostId, setEditingPostId] = useState(null);
      const [editingPostText, setEditingPostText] = useState('');
      const [editingMineralId, setEditingMineralId] = useState(null);
      const [editingMineralForm, setEditingMineralForm] = useState({ name: '', weight: '', location: '', priceUSD: '', media: '' });

      // --- HYDROLOGICS TAB STATES ---
      const [conductivity, setConductivity] = useState('15'); // K (m/day)
      const [gradient, setGradient] = useState('0.02');      // i (dh/dl)
      const [crossArea, setCrossArea] = useState('250');      // A (m²)
      const [calculatedDischarge, setCalculatedDischarge] = useState(null);

      const [newHydroLocation, setNewHydroLocation] = useState('');
      const [newHydroDepth, setNewHydroDepth] = useState('');
      const [newHydroPh, setNewHydroPh] = useState('7.0');
      const [newHydroMedia, setNewHydroMedia] = useState(null); // Optional log photo from local storage

      // --- CUSTOM DIALOG ENGINE FOR ALERTS/CONFIRMS ---
      const [alertConfig, setAlertConfig] = useState({ show: false, title: '', message: '', type: 'info', onConfirm: null });

      // Live firebase ref
      const firebaseAuthRef = useRef(null);

      const triggerAlert = (title, message, type = 'info', onConfirm = null) => {
        setAlertConfig({ show: true, title, message, type, onConfirm });
      };

      const closeAlert = () => {
        setAlertConfig({ show: false, title: '', message: '', type: 'info', onConfirm: null });
      };

      const pushSystemLog = (category, message) => {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        setSystemLogs(prev => [
          { id: Date.now(), timestamp, category, message },
          ...prev
        ]);
      };

      useEffect(() => {
        // Initialize dynamic Firebase Auth if variables are injected/configured, otherwise fallback
        let firebaseConfig = null;
        try {
          if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            firebaseConfig = JSON.parse(__firebase_config);
          }
        } catch (e) {
          console.warn("Could not parse dynamic Firebase config, operating in fallback/simulated mode.");
        }

        if (firebaseConfig && !firebase.apps.length) {
          try {
            firebase.initializeApp(firebaseConfig);
            firebaseAuthRef.current = firebase.auth();
            pushSystemLog("Auth", "Live Firebase Authentication initialized successfully.");
            
            // Authentication state change observer
            firebaseAuthRef.current.onAuthStateChanged((user) => {
              if (user) {
                setIsLoggedIn(true);
                setUserEmail(user.email || '');
                const cleanName = user.displayName || user.email.split('@')[0];
                const updatedProfile = {
                  ...profile,
                  email: user.email || '',
                  name: cleanName.charAt(0).toUpperCase() + cleanName.slice(1),
                  avatar: user.photoURL || profile.avatar
                };
                setProfile(updatedProfile);
                setTempProfile(updatedProfile);
                pushSystemLog("Auth", `User session detected: ${user.email} (UID: ${user.uid})`);
              } else {
                setIsLoggedIn(false);
                setUserEmail('');
              }
            });
          } catch (err) {
            console.error("Firebase startup exception:", err);
            pushSystemLog("Error", "Failed to mount live Firebase Auth. Reverting to simulator.");
          }
        } else {
          pushSystemLog("Auth", "Running in high-fidelity simulated local authentication environment.");
        }
      }, []);

      useEffect(() => {
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add('opacity-100', 'translate-y-0');
                entry.target.classList.remove('opacity-0', 'translate-y-10');
              }
            });
          },
          { threshold: 0.1 }
        );

        const elements = document.querySelectorAll('.animate-on-scroll');
        elements.forEach((el) => observer.observe(el));
        return () => elements.forEach((el) => observer.unobserve(el));
      }, [currentTab, feed, minerals, hydroLogs, siteLogo, siteTitle]);

      const formatPrice = (usdValue) => {
        if (currency === 'USD') return `$${usdValue.toLocaleString()}`;
        return `MWK ${(usdValue * usdToMwkRate).toLocaleString()}`;
      };

      const handleAdminVerify = (e) => {
        e.preventDefault();
        if (adminKeyInput === 'ignatius2026') {
          setIsAdmin(true);
          setAdminKeyError('');
          pushSystemLog("Auth", "Administrative privileges validated with terminal token.");
          triggerAlert("Access Granted", "Welcome to Kamwanje admin management console.", "success");
        } else {
          setAdminKeyError('Invalid Access Key. Please try again.');
          pushSystemLog("Security", "Failed administration login trial attempt.");
        }
      };

      const handleLogoUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const localUrl = URL.createObjectURL(file);
          setSiteLogo(localUrl);
          pushSystemLog("Config", "Dynamic corporate logo replaced with local file reference.");
        }
      };

      // Email Login / Signup execution
      const handleAuthSubmit = async (e) => {
        e.preventDefault();
        setAuthError('');
        
        if (!allowRegistration && authMode === 'signup') {
          triggerAlert("Sign-Ups Locked", "Admin has temporarily locked user registration actions.", "warning");
          return;
        }

        if (!authEmail || !authPassword) {
          setAuthError('Please complete all credential fields.');
          return;
        }

        setIsAuthLoading(true);
        pushSystemLog("Auth", `Attempting ${authMode} for ${authEmail}...`);

        try {
          if (firebaseAuthRef.current) {
            // Live Firebase Auth Flow
            if (authMode === 'login') {
              await firebaseAuthRef.current.signInWithEmailAndPassword(authEmail, authPassword);
              triggerAlert("Welcome Back", "Session loaded securely via Firebase.", "success");
            } else {
              const userCredential = await firebaseAuthRef.current.createUserWithEmailAndPassword(authEmail, authPassword);
              if (authDisplayName) {
                await userCredential.user.updateProfile({ displayName: authDisplayName });
              }
              triggerAlert("Welcome!", "Account provisioned and authenticated via Firebase.", "success");
            }
          } else {
            // Simulated local memory fallback authentication (Safe Sandbox Mode)
            setTimeout(() => {
              setIsLoggedIn(true);
              setUserEmail(authEmail);
              const calculatedName = authDisplayName || authEmail.split('@')[0];
              const resolvedProfile = {
                ...profile,
                email: authEmail,
                name: calculatedName.charAt(0).toUpperCase() + calculatedName.slice(1)
              };
              setProfile(resolvedProfile);
              setTempProfile(resolvedProfile);
              setIsAuthLoading(false);
              pushSystemLog("Auth", `Simulated session authenticated for email: ${authEmail}`);
              triggerAlert("Session Created", `Successfully logged in as ${calculatedName}.`, "success");
            }, 1000);
            return; // Exit here to prevent duplicate loading resets
          }
        } catch (err) {
          console.error(err);
          setAuthError(err.message || 'Authentication error encountered.');
          pushSystemLog("Security", `Auth failure: ${err.message}`);
        }
        setIsAuthLoading(false);
      };

      // Google Sign-In implementation (Firebase & Sim fallback)
      const handleGoogleSignIn = async () => {
        setAuthError('');
        setIsAuthLoading(true);
        pushSystemLog("Auth", "Requesting Google OAuth login sequence...");

        try {
          if (firebaseAuthRef.current) {
            const provider = new firebase.auth.GoogleAuthProvider();
            await firebaseAuthRef.current.signInWithPopup(provider);
            triggerAlert("Google Auth Connected", "Successfully loaded Google profile.", "success");
          } else {
            // Simulated fallback Google Authorization sequence
            setTimeout(() => {
              setIsLoggedIn(true);
              const googleEmail = "geologist.explorer@google.com";
              setUserEmail(googleEmail);
              const resolvedProfile = {
                ...profile,
                email: googleEmail,
                name: "Google Explorer",
                avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150"
              };
              setProfile(resolvedProfile);
              setTempProfile(resolvedProfile);
              setIsAuthLoading(false);
              pushSystemLog("Auth", `Simulated Google Session authorized for: ${googleEmail}`);
              triggerAlert("Google Session Configured", "Simulated OAuth connection succeeded.", "success");
            }, 1000);
            return;
          }
        } catch (err) {
          console.error(err);
          setAuthError(err.message || 'Google Auth sequence aborted.');
          pushSystemLog("Security", `Google Auth error: ${err.message}`);
        }
        setIsAuthLoading(false);
      };

      // Global Log Out Trigger
      const handleLogOut = async () => {
        try {
          if (firebaseAuthRef.current) {
            await firebaseAuthRef.current.signOut();
          }
          setIsLoggedIn(false);
          setUserEmail('');
          setProfile({
            name: 'Guest Explorer',
            email: '',
            phone: '+265 888 12 34 56',
            bio: 'Passionate about geology and raw mineral commerce across Malawi.',
            link: 'https://github.com',
            avatar: 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150',
            gallery: []
          });
          pushSystemLog("Auth", "Session terminated. Reverting state back to guest explorer.");
          triggerAlert("Signed Out", "Explorer credentials have been cleared safely.", "info");
        } catch (err) {
          pushSystemLog("Error", "Error encountered terminating auth session.");
        }
      };

      const handleCreatePost = (e) => {
        e.preventDefault();
        if (!newPostText && !newPostMedia) return;

        // Determine user identity
        const authorName = isAdmin ? "Admin (KAMWANJE)" : (isLoggedIn ? profile.name : "Guest Explorer");
        const authorAvatar = isAdmin ? "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150" : profile.avatar;

        const post = {
          id: Date.now(),
          author: authorName,
          avatar: authorAvatar,
          story: newPostText,
          media: newPostMedia || null,
          mediaType: newPostMediaType,
          timestamp: "Just now",
          likes: 0,
          reactions: { like: 0, love: 0, fire: 0, diamond: 0 },
          userReaction: null,
          comments: []
        };

        setFeed([post, ...feed]);
        pushSystemLog("Publish", `New broadcast entry registered (ID: ${post.id}) by ${authorName}.`);
        setNewPostText('');
        setNewPostMedia('');
        setIsCreateModalOpen(false);
      };

      const handleFeedMediaUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const localUrl = URL.createObjectURL(file);
          setNewPostMedia(localUrl);
          setNewPostMediaType(file.type.startsWith('video/') ? 'video' : 'image');
          pushSystemLog("Media", `Home broadcast creator appended local file asset: ${file.name}`);
        }
      };

      const startEditingPost = (post) => {
        setEditingPostId(post.id);
        setEditingPostText(post.story);
      };

      const saveEditedPost = (postId) => {
        setFeed(feed.map(p => p.id === postId ? { ...p, story: editingPostText } : p));
        pushSystemLog("Publish", `Modified post payload: ${postId}`);
        setEditingPostId(null);
      };

      const handleDeletePost = (postId) => {
        triggerAlert("Confirm Delete", "Are you sure you want to permanently delete this broadcast post?", "confirm", () => {
          setFeed(feed.filter(p => p.id !== postId));
          pushSystemLog("Publish", `Erased home broadcast stream coordinate: ${postId}`);
        });
      };

      const handleReaction = (postId, reactionType) => {
        setFeed(feed.map(post => {
          if (post.id === postId) {
            const updatedReactions = { ...post.reactions };
            let updatedUserReaction = reactionType;
            
            if (post.userReaction === reactionType) {
              updatedReactions[reactionType] = Math.max(0, updatedReactions[reactionType] - 1);
              updatedUserReaction = null;
            } else {
              if (post.userReaction) {
                updatedReactions[post.userReaction] = Math.max(0, updatedReactions[post.userReaction] - 1);
              }
              updatedReactions[reactionType] = (updatedReactions[reactionType] || 0) + 1;
            }

            return {
              ...post,
              reactions: updatedReactions,
              userReaction: updatedUserReaction,
              likes: updatedUserReaction ? post.likes + 1 : Math.max(0, post.likes - 1)
            };
          }
          return post;
        }));
        pushSystemLog("UserActivity", `Dispatched reactive feedback state (${reactionType}) on post ID: ${postId}`);
      };

      const handleAddComment = (postId) => {
        if (!allowComments) {
          triggerAlert("Feedback Disabled", "Admin has temporarily suspended commentary features platform-wide.", "warning");
          return;
        }
        const text = commentInputs[postId];
        if (!text || !text.trim()) return;

        setFeed(feed.map(post => {
          if (post.id === postId) {
            return {
              ...post,
              comments: [...post.comments, {
                id: Date.now(),
                user: isLoggedIn ? profile.name : "Anonymous User",
                avatar: isLoggedIn ? profile.avatar : "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150",
                text: text,
                replies: []
              }]
            };
          }
          return post;
        }));
        pushSystemLog("UserActivity", `Dispatched commentary text string to post reference ID: ${postId}`);
        setCommentInputs({ ...commentInputs, [postId]: '' });
      };

      const handleAddReply = (postId, commentId) => {
        if (!allowComments) {
          triggerAlert("Feedback Disabled", "Admin has temporarily suspended commentary features platform-wide.", "warning");
          return;
        }
        const text = replyInputs[commentId];
        if (!text || !text.trim()) return;

        setFeed(feed.map(post => {
          if (post.id === postId) {
            return {
              ...post,
              comments: post.comments.map(c => {
                if (c.id === commentId) {
                  return {
                    ...c,
                    replies: [...c.replies, {
                      id: Date.now(),
                      user: isLoggedIn ? profile.name : "Anonymous User",
                      text: text
                    }]
                  };
                }
                return c;
              })
            };
          }
          return post;
        }));
        pushSystemLog("UserActivity", `Appended reply trace to parent comment node: ${commentId}`);
        setReplyInputs({ ...replyInputs, [commentId]: '' });
        setActiveReplyBox(null);
      };

      const handleAddMineral = (e) => {
        e.preventDefault();
        if (!newMineral.name || !newMineral.priceUSD) return;
        const item = {
          id: Date.now(),
          name: newMineral.name,
          weight: newMineral.weight || 'N/A',
          location: newMineral.location || 'Unknown',
          priceUSD: parseFloat(newMineral.priceUSD),
          media: newMineral.media || "https://images.unsplash.com/photo-1599707367072-cd6ada2bc375?w=600"
        };
        setMinerals([...minerals, item]);
        pushSystemLog("Inventory", `Registered dynamic mineral specimen catalog trace: ${item.name}`);
        setNewMineral({ name: '', weight: '', location: '', priceUSD: '', media: '' });
      };

      const handleMineralMediaUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const localUrl = URL.createObjectURL(file);
          setNewMineral({ ...newMineral, media: localUrl });
          pushSystemLog("Media", `Mineral creator appended local asset payload: ${file.name}`);
        }
      };

      const startEditingMineral = (mineral) => {
        setEditingMineralId(mineral.id);
        setEditingMineralForm({
          name: mineral.name,
          weight: mineral.weight,
          location: mineral.location,
          priceUSD: mineral.priceUSD,
          media: mineral.media
        });
      };

      const handleEditMineralMediaUpload = (e) => {

                                  }} 
                                  className="accent-amber-500 h-4 w-4"
                                />
                              </label>
                            </div>
                          </div>

                          <div className="space-y-3">
                            <span className="text-[10px] font-black text-slate-400 uppercase block border-b border-white/10 pb-1">Tab Visibility Control for Guests</span>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                              {Object.keys(allowedTabs).map((tabKey) => (
                                <label key={tabKey} className="flex flex-col items-center justify-between p-2.5 bg-black/5 dark:bg-white/5 rounded-xl border border-black/5 text-center">
                                  <span className="text-[10px] font-bold capitalize mb-2">{tabKey}</span>
                                  <input 
                                    type="checkbox" 
                                    checked={allowedTabs[tabKey]} 
                                    onChange={(e) => {
                                      const updated = { ...allowedTabs, [tabKey]: e.target.checked };
                                      setAllowedTabs(updated);
                                      pushSystemLog("Config", `Tab [${tabKey}] visibility configured to: ${e.target.checked}`);
                                    }} 
                                    className="accent-amber-500 h-4 w-4"
                                  />
                                </label>
                              ))}
                            </div>
                          </div>
                        </div>

                        {/* CATALOG SPECIMEN INVENTORY MODIFIER SUITE */}
                        <div className="glass-ios p-5 rounded-3xl space-y-4">
                          <h4 className="font-bold text-emerald-500 uppercase tracking-wide">Current Inventory Management Logs</h4>
                          
                          <div className="space-y-2">
                            {minerals.map(mineral => (
                              <div key={mineral.id} className="p-3 bg-black/5 dark:bg-white/5 rounded-xl space-y-2 border border-black/5 dark:border-white/10">
                                {editingMineralId === mineral.id ? (
                                  <div className="grid grid-cols-2 gap-2 animate-fadeIn">
                                    <input type="text" value={editingMineralForm.name} onChange={(e) => setEditingMineralForm({...editingMineralForm, name: e.target.value})} className="p-1.5 bg-white dark:bg-slate-950 border rounded text-[11px] outline-none" />
                                    <input type="text" value={editingMineralForm.weight} onChange={(e) => setEditingMineralForm({...editingMineralForm, weight: e.target.value})} className="p-1.5 bg-white dark:bg-slate-950 border rounded text-[11px] outline-none" />
                                    <input type="text" value={editingMineralForm.location} onChange={(e) => setEditingMineralForm({...editingMineralForm, location: e.target.value})} className="p-1.5 bg-white dark:bg-slate-950 border rounded text-[11px] outline-none" />
                                    <input type="number" value={editingMineralForm.priceUSD} onChange={(e) => setEditingMineralForm({...editingMineralForm, priceUSD: e.target.value})} className="p-1.5 bg-white dark:bg-slate-950 border rounded text-[11px] outline-none" />
                                    
                                    <div className="col-span-2 flex flex-col space-y-1">
                                      <label className="text-[10px] font-black text-slate-400">Modify Specimen Image (Local Storage)</label>
                                      <input type="file" accept="image/*" onChange={handleEditMineralMediaUpload} className="w-full text-xs text-slate-500" />
                                    </div>

                                    <div className="col-span-2 flex space-x-2 pt-1">
                                      <button onClick={() => saveEditedMineral(mineral.id)} className="px-3 py-1 bg-emerald-600 text-white font-bold rounded">Save Changes</button>
                                      <button onClick={() => setEditingMineralId(null)} className="px-3 py-1 bg-slate-500 text-white font-bold rounded">Cancel</button>
                                    </div>
                                  </div>
                                ) : (
                                  <div className="flex justify-between items-center">
                                    <div className="flex items-center space-x-2">
                                      <img src={mineral.media} alt="" className="w-8 h-8 rounded-md object-cover" />
                                      <div>
                                        <span className="font-bold text-slate-800 dark:text-slate-100">{mineral.name}</span>
                                        <p className="text-[10px] opacity-60">{mineral.weight} — Found: {mineral.location}</p>
                                      </div>
                                    </div>
                                    <div className="flex space-x-2">
                                      <button onClick={() => startEditingMineral(mineral)} className="px-2 py-1 bg-amber-500/20 text-amber-500 font-bold rounded text-[10px]">Adjust</button>
                                      <button onClick={() => handleDeleteMineral(mineral.id)} className="px-2 py-1 bg-red-500/20 text-red-500 font-bold rounded text-[10px]">Drop</button>
                                    </div>
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>

                          {/* Add Mineral Entry Form */}
                          <form onSubmit={handleAddMineral} className="pt-4 border-t border-slate-200 dark:border-slate-800 space-y-2.5">
                            <span className="text-[11px] font-bold uppercase text-slate-400 block">Inject New Specimen Record</span>
                            <div className="grid grid-cols-2 gap-2">
                              <input type="text" required placeholder="Mineral Reference Name" value={newMineral.name} onChange={(e) => setNewMineral({...newMineral, name: e.target.value})} className="p-2 bg-white/50 border dark:border-slate-800 rounded-xl outline-none" />
                              <input type="text" placeholder="Weight Metrics" value={newMineral.weight} onChange={(e) => setNewMineral({...newMineral, weight: e.target.value})} className="p-2 bg-white/50 border dark:border-slate-800 rounded-xl outline-none" />
                              <input type="text" placeholder="Origin Site Coordinates" value={newMineral.location} onChange={(e) => setNewMineral({...newMineral, location: e.target.value})} className="p-2 bg-white/50 border dark:border-slate-800 rounded-xl outline-none" />
                              <input type="number" required placeholder="Base Price (USD)" value={newMineral.priceUSD} onChange={(e) => setNewMineral({...newMineral, priceUSD: e.target.value})} className="p-2 bg-white/50 border dark:border-slate-800 rounded-xl outline-none" />
                            </div>
                            
                            <div className="flex flex-col space-y-1">
                              <label className="text-[10px] font-bold text-slate-400 uppercase">Mineral Image Attachment (Local Storage)</label>
                              <input 
                                type="file" 
                                accept="image/*" 
                                onChange={handleMineralMediaUpload} 
                                className="w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-emerald-500/10 file:text-emerald-500" 
                              />
                            </div>

                            <button type="submit" className="w-full py-2 bg-emerald-600 text-white font-bold rounded-xl transition-all">Commit Catalog Record</button>
                          </form>
                        </div>

                        {/* INTERACTIVE REAL-TIME AUDIT LOGS WINDOW */}
                        <div className="glass-ios p-5 rounded-3xl space-y-3 shadow-lg">
                          <div className="flex items-center justify-between">
                            <h4 className="font-bold text-emerald-400 uppercase tracking-wide">Real-Time System Audit Terminal</h4>
                            <button 
                              onClick={() => {
                                setSystemLogs([{ id: 1, timestamp: new Date().toLocaleTimeString(), category: "Admin", message: "Security log register cleared." }]);
                                triggerAlert("Cleared", "Audit register traces wiped from session memory.", "success");
                              }}
                              className="px-2 py-1 bg-red-500/10 text-red-400 font-bold rounded-lg border border-red-500/20 text-[9px] uppercase tracking-wider"
                            >
                              Clear Register
                            </button>
                          </div>

                          <div className="p-3 bg-slate-950 text-emerald-500 font-mono text-[10px] rounded-xl h-48 overflow-y-auto space-y-1.5 scrollbar-thin border border-slate-800">
                            {systemLogs.map(log => (
                              <div key={log.id} className="leading-relaxed border-b border-slate-900/50 pb-1.5 flex items-start space-x-1">
                                <span className="text-slate-500">[{log.timestamp}]</span>
                                <span className="text-blue-400 font-bold">[{log.category}]</span>
                                <span className="text-slate-300">{log.message}</span>
                              </div>
                            ))}
                          </div>
                        </div>

                      </div>
                    )}
                  </div>
                )}

              </React.Fragment>
            )}

          </main>

          {/* BRANDING FOOTER AT THE BOTTOM */}
          <footer className="fixed bottom-0 left-0 right-0 z-40 backdrop-blur-xl bg-white/40 dark:bg-slate-950/40 border-t border-white/10 dark:border-slate-900/60 py-3.5 text-center shadow-lg">
            <p className="text-[11px] font-black tracking-widest text-slate-500 uppercase">
              OWNED BY <span className="bg-gradient-to-r from-amber-500 to-emerald-500 bg-clip-text text-transparent font-black">KAMWANJE</span> &copy; 2026
            </p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
