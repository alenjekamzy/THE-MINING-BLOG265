<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MINING BLOG265</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

    <div id="app" class="max-w-2xl mx-auto p-4">
        <header class="text-center py-10">
            <h1 class="text-4xl font-black text-black">THE MINING BLOG265</h1>
            <p class="text-gray-500 mt-2">Geologic Field Updates</p>
        </header>

        <div id="feed" class="space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="font-bold">Welcome, Explorer</h3>
                <p class="text-gray-600 mt-2">Site is live and ready for data.</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION: Replace with your actual Firebase config object
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "the-mining-blog265.firebaseapp.com",
            projectId: "the-mining-blog265",
            storageBucket: "the-mining-blog265.firebasestorage.app",
            messagingSenderId: "695888035037",
            appId: "1:695888035037:web:f91c76da82a2c3d98f6f34"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Simple fetch to display posts from Firestore
        const feedContainer = document.getElementById('feed');
        
        // This listens to your "posts" collection
        onSnapshot(collection(db, "posts"), (snapshot) => {
            feedContainer.innerHTML = ''; 
            snapshot.forEach((doc) => {
                const post = doc.data();
                feedContainer.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                        <h3 class="font-bold text-lg">${post.authorName || 'Explorer'}</h3>
                        <p class="mt-2 text-gray-800">${post.text}</p>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
